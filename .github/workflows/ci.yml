name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"

      - name: Go tests
        run:  go test -cover ./...

  fmt:
    name: Style
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check code formatting
        run: test -z $(go fmt ./...)

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          

      - name: Check code formatting
        run: test -z $(go fmt ./...)
        
      - name: Run staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@latest ./...

